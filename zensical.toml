# ============================================================================
# Software Plumbers — Zensical configuration
# Docs: https://zensical.org/docs/setup/basics/
# ============================================================================

[project]

site_name = "Software Plumbers"
site_description = "The plumbing underneath software: build systems, debuggers, profilers, and the runtime machinery nobody talks about."
site_author = "Ville Vainio"
site_url = "https://vivainio.github.io/sw-plumber-book/"

copyright = """
Copyright &copy; 2026 Ville Vainio
"""

# Source repository — enables the edit/view content actions below.
repo_url = "https://github.com/vivainio/sw-plumber-book"
repo_name = "vivainio/sw-plumber-book"

# Explicit navigation. Add sections here as the book grows.
nav = [
  { "Home" = "index.md" },
  { "Make" = "make/index.md" },
  { "Maven" = "maven/index.md" },
  { "Gradle" = "gradle/index.md" },
  { "Bazel" = "bazel/index.md" },
  { "MSBuild" = "msbuild/index.md" },
  { "npm, pnpm, and Yarn" = "npm/index.md" },
  { "Rust and Cargo" = "rust-cargo/index.md" },
  { "Python Packaging" = "python-packaging/index.md" },
  { "Python Virtual Environments" = "python-venvs/index.md" },
  { "Dependency Resolution & SemVer" = "dependency-resolution/index.md" },
  { "CI/CD Pipelines" = "cicd-pipelines/index.md" },
  { "Debuggers" = "debuggers/index.md" },
  { "Containers" = "containers/index.md" },
  { "OpenTelemetry" = [
      "opentelemetry/index.md",
      { "Traces and Context Propagation" = "opentelemetry/traces-and-context.md" },
      { "The OTLP Wire Protocol" = "opentelemetry/otlp-protocol.md" },
      { "Metrics and Logs" = "opentelemetry/metrics-and-logs.md" },
      { "SDK Pipeline and the Collector" = "opentelemetry/sdk-and-collector.md" },
      { "Auto-Instrumentation and Debugging the Pipeline" = "opentelemetry/instrumentation-and-debugging.md" },
    ]
  },
]

extra_css = ["stylesheets/extra.css"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
logo = "lucide/wrench"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/vivainio/sw-plumber-book"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
